name: Build AFFT APK

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch: {}

concurrency:
  group: build-apk
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install NDK
        run: |
          if [ -d "$ANDROID_HOME/ndk" ] && [ -n "$(ls -A $ANDROID_HOME/ndk 2>/dev/null)" ]; then
            echo "NDK cached: $(ls -d $ANDROID_HOME/ndk/*)"
          else
            echo "Installing NDK..."
            SDKMANAGER=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
            if [ -f "$SDKMANAGER" ]; then
              echo "y" | $SDKMANAGER --install "ndk;27.0.12077973" --sdk_root=$ANDROID_HOME 2>&1
            else
              curl -sLo /tmp/ndk.zip "https://dl.google.com/android/repository/android-ndk-r27-linux.zip"
              unzip -q /tmp/ndk.zip -d /tmp/
            fi
          fi
        shell: bash

      - name: Compile native libs (liblzma + libzstd) for Android
        run: |
          set -euo pipefail
          if [ -d "$ANDROID_HOME/ndk" ] && [ -n "$(ls -A $ANDROID_HOME/ndk 2>/dev/null)" ]; then
            NDK_DIR=$(ls -d $ANDROID_HOME/ndk/* 2>/dev/null | head -1)
          else
            NDK_DIR=/tmp/android-ndk-r27
          fi
          TOOLCHAIN=$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH
          CC=$TOOLCHAIN/bin/aarch64-linux-android21-clang
          AR=$TOOLCHAIN/bin/llvm-ar
          RANLIB=$TOOLCHAIN/bin/llvm-ranlib

          WORK_DIR=/tmp/payload-build
          mkdir -p "$WORK_DIR"
          cd "$WORK_DIR"

          # Build liblzma.a
          LZMA_VER="5.4.6"
          curl -sLo "xz-${LZMA_VER}.tar.xz"             "https://github.com/tukaani-project/xz/releases/download/v${LZMA_VER}/xz-${LZMA_VER}.tar.xz"
          rm -rf "xz-${LZMA_VER}"
          tar -xf "xz-${LZMA_VER}.tar.xz"
          cd "xz-${LZMA_VER}"
          ./configure --host=aarch64-linux-android --prefix="$WORK_DIR/xz-install"             CC="$CC" AR="$AR" RANLIB="$RANLIB"             --enable-static --disable-shared             --disable-xz --disable-xzdec --disable-lzmadec             --disable-lzmainfo --disable-lzma-links             --disable-scripts --disable-doc --with-pic
          make -j$(nproc)
          make install

          # Build libzstd.a
          cd "$WORK_DIR"
          git clone --depth=1 --branch v1.5.5 https://github.com/facebook/zstd.git
          cd zstd
          make clean 2>/dev/null || true
          CC="$CC" AR="$AR" make -C lib libzstd.a -j$(nproc) 2>&1

          echo "=== Native libs built ==="
          ls -lh "$WORK_DIR/xz-install/lib/liblzma.a"
          ls -lh "$WORK_DIR/zstd/lib/libzstd.a"
        shell: bash

      - name: Build CGO-native payload-dumper-go
        run: |
          set -euo pipefail
          if [ -d "$ANDROID_HOME/ndk" ] && [ -n "$(ls -A $ANDROID_HOME/ndk 2>/dev/null)" ]; then
            NDK_DIR=$(ls -d $ANDROID_HOME/ndk/* 2>/dev/null | head -1)
          else
            NDK_DIR=/tmp/android-ndk-r27
          fi
          TOOLCHAIN=$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH
          CC=$TOOLCHAIN/bin/aarch64-linux-android21-clang

          WORK_DIR=/tmp/payload-build
          cd "$WORK_DIR"

          # Fetch payload-dumper-go
          rm -rf payload-dumper-go
          git clone --depth=1 https://github.com/ssut/payload-dumper-go.git
          cd payload-dumper-go

          # Apply CGO patch
          sed -i '/"github.com\/ulikunitz\/xz"/d' payload.go
          sed -i 's/xz\.NewReader(teeReader)/newXzReader(teeReader)/g' payload.go
          go mod edit -droprequire github.com/ulikunitz/xz 2>/dev/null || true
          cp ${{ github.workspace }}/tools/cgo_lzma.go ./

          # Prepare go.sum via go mod tidy (this will pull gozstd)
          export GO111MODULE=on
          export CGO_ENABLED=1
          export GOOS=android
          export GOARCH=arm64
          export CC="$CC"
          export CGO_CFLAGS="-I$WORK_DIR/xz-install/include -O2"
          export CGO_LDFLAGS="-L$WORK_DIR/xz-install/lib -l:liblzma.a -L$WORK_DIR/zstd/lib -l:libzstd.a"

          # Use writable module cache so we can patch gozstd
          export GOMODCACHE="$WORK_DIR/go-mod-cache"
          mkdir -p "$GOMODCACHE"

          go mod tidy 2>&1

          # Patch gozstd: replace its Linux GLIBC .a with Android-compiled .a
          GOZSTD_DIR="$GOMODCACHE/github.com/valyala/gozstd@v1.21.1"
          if [ -d "$GOZSTD_DIR" ]; then
            echo "=== Replacing gozstd .a files ==="
            chmod -R u+w "$GOZSTD_DIR"
            rm -f "$GOZSTD_DIR/libzstd_linux_arm64.a"
            cp "$WORK_DIR/zstd/lib/libzstd.a" "$GOZSTD_DIR/libzstd_linux_arm64.a"
            ls -la "$GOZSTD_DIR/libzstd_linux_"*.a
          else
            echo "WARNING: gozstd not found at $GOZSTD_DIR"
          fi

          go build             -ldflags="-linkmode=external -s -w"             -o libpayload-dumper-go.so             .

          echo "=== Verifying ==="
          file libpayload-dumper-go.so
          NEEDED=$(readelf -d libpayload-dumper-go.so 2>/dev/null | grep NEEDED || true)
          echo "$NEEDED"
          if echo "$NEEDED" | grep -q "lzma\|zstd"; then
            echo "Native libraries still dynamic!"
            exit 1
          fi
          echo "Native libs statically embedded"

          $TOOLCHAIN/bin/llvm-strip libpayload-dumper-go.so 2>/dev/null || true

          JNILIBS="${{ github.workspace }}/app/src/main/jniLibs/arm64-v8a"
          mkdir -p "$JNILIBS"
          cp libpayload-dumper-go.so "$JNILIBS/libpayload-dumper-go.so"
          chmod 755 "$JNILIBS/libpayload-dumper-go.so"
          ls -lh "$JNILIBS/libpayload-dumper-go.so"
        shell: bash

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.7'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Generate version
        id: version
        run: |
          echo "tag=v2.0.9-beta-${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "apk=AFFT-Beta-Stable_v2.0.9-b${{ github.run_number }}.apk" >> $GITHUB_OUTPUT
          echo "name=Beta Stable v2.0.9-b${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build APK with Gradle
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk              app/build/outputs/apk/debug/${{ steps.version.outputs.apk }}

      - name: Create Release
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.name }}" \
            --notes "## AFFT Beta Stable

            **Build:** ${{ github.run_number }}" \
            "app/build/outputs/apk/debug/${{ steps.version.outputs.apk }}"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}


