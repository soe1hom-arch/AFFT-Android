name: Build AFFT APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install NDK & cross-compile liblzma.so.5 for Android ARM64
        run: |
          # --- Find/Cache NDK ---
          if [ -d "$ANDROID_HOME/ndk" ] && [ -n "$(ls -A $ANDROID_HOME/ndk 2>/dev/null)" ]; then
            NDK_DIR=$(ls -d $ANDROID_HOME/ndk/* 2>/dev/null | head -1)
            echo "Using cached NDK: $NDK_DIR"
          else
            echo "Installing NDK..."
            SDKMANAGER=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
            if [ -f "$SDKMANAGER" ]; then
              echo "y" | $SDKMANAGER --install "ndk;27.0.12077973" --sdk_root=$ANDROID_HOME 2>&1
              NDK_DIR=$(ls -d $ANDROID_HOME/ndk/* 2>/dev/null | head -1)
            else
              echo "sdkmanager not found, downloading NDK directly..."
              curl -sLo /tmp/ndk.zip "https://dl.google.com/android/repository/android-ndk-r27-linux.zip"
              unzip -q /tmp/ndk.zip -d /tmp/
              NDK_DIR=/tmp/android-ndk-r27
            fi
          fi
          
          [ -z "$NDK_DIR" ] && { echo "ERROR: NDK not found!"; exit 1; }
          TOOLCHAIN=$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH
          export CC=$TOOLCHAIN/bin/aarch64-linux-android21-clang
          echo "Using toolchain: $TOOLCHAIN"
          
          # --- Cross-compile liblzma.so.5 for Android ARM64 ---
          echo "Downloading XZ Utils 5.4.6..."
          curl -sLo /tmp/xz.tar.xz "https://github.com/tukaani-project/xz/releases/download/v5.4.6/xz-5.4.6.tar.xz"
          tar -xf /tmp/xz.tar.xz -C /tmp/
          cd /tmp/xz-5.4.6
          
          echo "Configuring for Android arm64..."
          ./configure --host=aarch64-linux-android --prefix=/tmp/xz-install             CC=$CC --disable-static --enable-shared --disable-xz --disable-xzdec             --disable-lzmadec --disable-lzmainfo --disable-lzma-links             --disable-scripts --disable-doc 2>&1
          
          echo "Building liblzma..."
          make -j$(nproc) 2>&1
          make install 2>&1
          
          if [ -f /tmp/xz-install/lib/liblzma.so.5 ]; then
            echo "=== liblzma.so.5 built successfully! ==="
            file /tmp/xz-install/lib/liblzma.so.5
            readelf -d /tmp/xz-install/lib/liblzma.so.5 2>/dev/null | grep NEEDED
            # Copy ke assets/bin/ untuk runtime fallback (optional)
            mkdir -p ${{ github.workspace }}/app/src/main/assets/bin/
            cp /tmp/xz-install/lib/liblzma.so.5 ${{ github.workspace }}/app/src/main/assets/bin/
            echo "liblzma.so.5 deployed to assets/bin/ (optional fallback)"
          else
            echo "NOTE: liblzma.so.5 build skipped (not needed - payload-dumper-go is static)"
          fi
          
          # Verify payload-dumper-go is static (tidak perlu library external)
          echo "=== Verifying payload-dumper-go ==="
          PAYLOAD_BIN="${{ github.workspace }}/app/src/main/jniLibs/arm64-v8a/libpayload-dumper-go.so"
          if [ -f "$PAYLOAD_BIN" ]; then
            NEEDED=$(readelf -d "$PAYLOAD_BIN" 2>/dev/null | grep NEEDED | head -5 || true)
            if [ -z "$NEEDED" ]; then
              echo "✓ payload-dumper-go is STATIC binary (no library dependencies)"
            else
              echo "⚠ payload-dumper-go has NEEDED libraries:"
              echo "$NEEDED"
            fi
          fi
        shell: bash

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build APK with Gradle
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AFFT-APK-Debug
          path: app/build/outputs/apk/debug/*.apk
