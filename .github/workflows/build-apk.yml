name: Build AFFT APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install NDK & compile CGO-native payload-dumper-go
        run: |
          set -euo pipefail
          # ─── Find NDK ─────────────────────────────────────────
          if [ -d "$ANDROID_HOME/ndk" ] && [ -n "$(ls -A $ANDROID_HOME/ndk 2>/dev/null)" ]; then
            NDK_DIR=$(ls -d $ANDROID_HOME/ndk/* 2>/dev/null | head -1)
            echo "Using cached NDK: $NDK_DIR"
          else
            echo "Installing NDK..."
            SDKMANAGER=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
            if [ -f "$SDKMANAGER" ]; then
              echo "y" | $SDKMANAGER --install "ndk;27.0.12077973" --sdk_root=$ANDROID_HOME 2>&1
              NDK_DIR=$(ls -d $ANDROID_HOME/ndk/* 2>/dev/null | head -1)
            else
              echo "sdkmanager not found, downloading NDK directly..."
              curl -sLo /tmp/ndk.zip "https://dl.google.com/android/repository/android-ndk-r27-linux.zip"
              unzip -q /tmp/ndk.zip -d /tmp/
              NDK_DIR=/tmp/android-ndk-r27
            fi
          fi
          [ -z "$NDK_DIR" ] && { echo "ERROR: NDK not found!"; exit 1; }

          TOOLCHAIN=$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH
          CC=$TOOLCHAIN/bin/aarch64-linux-android21-clang
          AR=$TOOLCHAIN/bin/llvm-ar
          RANLIB=$TOOLCHAIN/bin/llvm-ranlib
          echo "Using toolchain: $TOOLCHAIN"

          WORK_DIR=/tmp/payload-build
          mkdir -p "$WORK_DIR"

          # ─── [1] Build liblzma.a (static) ─────────────────────
          echo "=== [1] Building liblzma.a ==="
          cd "$WORK_DIR"
          LZMA_VER="5.4.6"
          if [ ! -f "xz-${LZMA_VER}.tar.xz" ]; then
            curl -sLo "xz-${LZMA_VER}.tar.xz" \
              "https://github.com/tukaani-project/xz/releases/download/v${LZMA_VER}/xz-${LZMA_VER}.tar.xz"
          fi
          rm -rf "xz-${LZMA_VER}"
          tar -xf "xz-${LZMA_VER}.tar.xz"
          cd "xz-${LZMA_VER}"
          ./configure --host=aarch64-linux-android \
            --prefix="$WORK_DIR/xz-install" \
            CC="$CC" AR="$AR" RANLIB="$RANLIB" \
            --enable-static --disable-shared \
            --disable-xz --disable-xzdec --disable-lzmadec \
            --disable-lzmainfo --disable-lzma-links \
            --disable-scripts --disable-doc --with-pic
          make -j$(nproc)
          make install
          echo "=== liblzma.a built ==="

          # ─── [2] Fetch payload-dumper-go ──────────────────────
          echo "=== [2] Fetching payload-dumper-go ==="
          cd "$WORK_DIR"
          rm -rf payload-dumper-go
          git clone --depth=1 https://github.com/ssut/payload-dumper-go.git

          # ─── [3] Apply CGO patch ──────────────────────────────
          echo "=== [3] Applying CGO patch ==="
          cd payload-dumper-go

          # Hapus import pure-Go xz
          sed -i '/"github.com\/ulikunitz\/xz"/d' payload.go
          # Ganti xz.NewReader -> newXzReader
          sed -i 's/xz\.NewReader(teeReader)/newXzReader(teeReader)/g' payload.go
          # Hapus dependency xz dari go.mod
          go mod edit -droprequire github.com/ulikunitz/xz 2>/dev/null || true
          # Copy CGO wrapper
          cp ${{ github.workspace }}/tools/cgo_lzma.go ./

          # ─── [4] Build zstd from source for Android ───────────
          # gozstd ships pre-compiled libzstd_linux_arm64.a (GLIBC/Linux)
          # which is incompatible with Android Bionic libc.
          # We'll build libzstd from source using NDK and replace it.
          echo "=== [4] Building zstd for Android ==="
          cd "$WORK_DIR"
          if [ ! -d "zstd" ]; then
            git clone --depth=1 --branch v1.5.5 https://github.com/facebook/zstd.git
          fi
          cd zstd
          make clean 2>/dev/null || true
          CC="$CC" AR="$AR" \
          make -C lib libzstd.a -j$(nproc) 2>&1
          echo "=== libzstd.a built ==="

          # ─── [5] Compile payload-dumper-go ────────────────────
          echo "=== [5] Compiling payload-dumper-go ==="
          cd "$WORK_DIR/payload-dumper-go"

          export GO111MODULE=on
          export CGO_ENABLED=1
          export GOOS=android
          export GOARCH=arm64
          export CC="$CC"
          export CGO_CFLAGS="-I$WORK_DIR/xz-install/include -O2"
          export CGO_LDFLAGS="-L$WORK_DIR/xz-install/lib -l:liblzma.a -L$WORK_DIR/zstd/lib -l:libzstd.a"

          # Generate go.sum via go mod tidy (this will pull gozstd too)
          go mod tidy 2>&1

          # Now exclude gozstd - we use our own compiled libzstd.a instead
          # go mod edit -exclude github.com/valyala/gozstd@v1.21.1

          # Actually, use replace to point gozstd to our own build
          mkdir -p "$WORK_DIR/gozstd-wrap"
          cat > "$WORK_DIR/gozstd-wrap/go.mod" << 'GOEOF'
module github.com/valyala/gozstd
go 1.18
GOEOF
          # Copy our built libzstd.a to the expected location
          GOZSTD_DIR=$(go env GOMODCACHE)/github.com/valyala/gozstd@v1.21.1
          if [ -d "$GOZSTD_DIR" ]; then
            echo "Replacing libzstd in gozstd module cache..."
            # Remove the linux GLIBC-compiled .a
            rm -f "$GOZSTD_DIR"/libzstd_linux_*.a
            # Put our Android-compiled one
            cp "$WORK_DIR/zstd/lib/libzstd.a" "$GOZSTD_DIR/libzstd_android_arm64.a"
          fi

          go build \
            -ldflags="-linkmode=external -s -w" \
            -o libpayload-dumper-go.so \
            .

          # ─── [6] Verifikasi ───────────────────────────────────
          echo "=== [6] Verifying binary ==="
          file libpayload-dumper-go.so
          NEEDED=$(readelf -d libpayload-dumper-go.so 2>/dev/null | grep NEEDED || true)
          echo "Dynamic NEEDED: $NEEDED"
          if echo "$NEEDED" | grep -q lzma; then
            echo "❌ liblzma is a dynamic dependency!"
            exit 1
          else
            echo "✓ liblzma statically embedded"
          fi
          if echo "$NEEDED" | grep -q "zstd"; then
            echo "✓ libzstd statically embedded"
          fi

          $TOOLCHAIN/bin/llvm-strip libpayload-dumper-go.so 2>/dev/null || true

          JNILIBS="${{ github.workspace }}/app/src/main/jniLibs/arm64-v8a"
          mkdir -p "$JNILIBS"
          cp libpayload-dumper-go.so "$JNILIBS/libpayload-dumper-go.so"
          chmod 755 "$JNILIBS/libpayload-dumper-go.so"
          echo "=== Deployed ==="
          ls -lh "$JNILIBS/libpayload-dumper-go.so"
        shell: bash

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build APK with Gradle
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AFFT-APK-Debug
          path: app/build/outputs/apk/debug/*.apk
