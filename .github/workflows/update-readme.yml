name: Update Beta Download Link

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-readme:
    if: github.event.release.prerelease
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get APK download URL
        id: get_url
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "Latest beta tag: $TAG"
          
          # Get the APK asset download URL
          ASSET_URL=$(curl -s             "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" |             python3 -c "import json,sys; data=json.load(sys.stdin); assets=[a for a in data.get('assets',[]) if a['name'].endswith('.apk')]; print(assets[0]['browser_download_url'] if assets else '')")
          
          echo "ASSET_URL=$ASSET_URL" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          ASSET_URL="${{ steps.get_url.outputs.ASSET_URL }}"
          TAG="${{ steps.get_url.outputs.TAG }}"
          
          if [ -z "$ASSET_URL" ]; then
            echo "No APK asset found, skipping..."
            exit 0
          fi
          
          echo "Updating README with: $ASSET_URL"
          
          # Update the beta row download link
          sed -i "s|https://github.com/soe1hom-arch/AFFT-Android/releases/download/beta-[^/]*/[^"]*|$ASSET_URL|g" README.md
          
          # Show the change
          grep "Latest Beta" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: update latest beta download link [skip ci]"
            git push
            echo "README updated!"
          else
            echo "No changes to README"
          fi
